<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Formulaire Patient</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: #ffffff;
      padding: 30px;
      border-radius: 15px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      animation: fadeIn 0.8s ease-in-out;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    label {
      font-weight: 600;
      margin-top: 10px;
      display: block;
      color: #444;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
      transition: 0.3s;
      font-size: 14px;
    }

    input:focus, textarea:focus {
      border-color: #4facfe;
      outline: none;
      box-shadow: 0 0 5px rgba(79,172,254,0.5);
    }

    textarea {
      resize: none;
      height: 80px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00c6ff;
    }

    .message {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}

    }
    .response-box {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #111;
  color: #0f0;
  padding: 15px;
  font-family: monospace;
  max-height: 200px;
  overflow-y: auto;
  box-shadow: 0 -5px 10px rgba(0,0,0,0.3);
}

.response-box h3 {
  margin: 0 0 10px;
  color: #00f2fe;
  font-size: 14px;
}

#responseContent {
  white-space: pre-wrap;
  font-size: 13px;
}
  </style>
</head>

<body>

<div class="container">
    <!-- 🔁 SWITCH -->
  <div style="display:flex; gap:10px; margin-bottom:15px;">
    <button type="button" onclick="setMode('patient')">Patient</button>
    <button type="button" onclick="setMode('ambulance')">Ambulance</button>
    <button type="button" onclick="setMode('medecin')">Médecin</button>
  </div>
  <h2 id="title">🩺 Formulaire Patient</h2>

  <form id="patientForm">
    <label>Nom complet :</label>
    <input type="text" id="fullname" required>

    <label>CIN :</label>
    <input type="text" id="cin" placeholder="AB123456" required>

    <label>Téléphone :</label>
    <input type="text" id="phone" placeholder="06XXXXXXXX / 07XXXXXXXX" required>

    <label>Âge :</label>
    <input type="number" id="age" required>

    <label>Symptômes :</label>
    <textarea id="symptoms" required></textarea>

    <button type="submit">Envoyer</button>
    <div id="message" class="message"></div>

  </form>

  
</div>


<script>
document.getElementById("patientForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const messageDiv = document.getElementById("message");
  messageDiv.textContent = "⏳ Envoi en cours...";
  messageDiv.className = "message";

 const data = {
  source: currentMode, // 🔥 dynamique
  fullname: document.getElementById("fullname").value,
  cin: document.getElementById("cin").value,
  phone: document.getElementById("phone").value,
  age: parseInt(document.getElementById("age").value),
  symptoms: document.getElementById("symptoms").value
};

  try {
  const response = await fetch("https://corsproxy.io/?url=https://fusion-ai-api.medifus.dev/webhooks/webhook-d21p9jgueufxg6w1wf5e8szd/gateway", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  // 🔥 Lire la réponse en TEXTE d'abord (important)
  const text = await response.text();

  let result;
  try {
    result = JSON.parse(text);
  } catch (e) {
    result = { message: text }; // fallback si pas JSON
  }

  // 🔽 afficher réponse brute
  document.getElementById("responseContent").textContent =
    JSON.stringify(result, null, 2);

  // ❌ Gestion erreur HTTP
  if (!response.ok) {
    messageDiv.textContent =
      "❌ " + (result.message || result.error || text || "Erreur serveur");
    messageDiv.className = "message error";
    return;
  }

  // ✅ Succès
  let msg = "✅ " + (result.message || "Traitement réussi");

  if (result.severity) {
    msg += " | Gravité : " + result.severity;
  }

  messageDiv.textContent = msg;
  messageDiv.className = "message success";

  document.getElementById("patientForm").reset();

} catch (error) {
  messageDiv.textContent = "❌ Erreur réseau : " + error.message;
  messageDiv.className = "message error";
}
});


let currentMode = "patient";

function setMode(mode) {
  currentMode = mode;

  const title = document.getElementById("title");

  if (mode === "patient") {
    title.textContent = "🩺 Formulaire Patient";
    document.body.style.background = "linear-gradient(135deg, #4facfe, #00f2fe)";
  }

  if (mode === "ambulance") {
    title.textContent = "🚑 Formulaire Ambulance";
    document.body.style.background = "linear-gradient(135deg, #ff4e50, #f9d423)";
  }

  if (mode === "medecin") {
    title.textContent = "👨‍⚕️ Formulaire Médecin";
    document.body.style.background = "linear-gradient(135deg, #43e97b, #38f9d7)";
  }
}
</script>
<div class="response-box">
  <h3>Réponse serveur</h3>
  <pre id="responseContent"></pre>
</div>
</body>
</html>
